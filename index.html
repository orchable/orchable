<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Orchable — Orchestrate Anything. Automatically.</title>
		<meta
			name="description"
			content="Orchable is an AI-powered pipeline orchestration platform. Design multi-stage workflows, run batch jobs, and monitor results in real time."
		/>
		<meta name="author" content="Orchable" />

		<meta
			property="og:title"
			content="Orchable — Orchestrate Anything. Automatically."
		/>
		<meta
			property="og:description"
			content="Design AI pipelines visually. Run batch jobs at scale. Monitor results in real time."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://orchable.app" />
		<meta property="og:image" content="https://orchable.app/og-image.jpg" />

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:site" content="@orchable" />
		<meta
			name="twitter:title"
			content="Orchable — Orchestrate Anything. Automatically."
		/>
		<meta
			name="twitter:description"
			content="Design AI pipelines visually. Run batch jobs at scale. Monitor results in real time."
		/>
		<meta name="twitter:image" content="https://orchable.app/og-image.jpg" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<link rel="icon" type="image/jpeg" href="/icon.jpg" />

		<style>
			#initial-loader {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				background: #030014;
				z-index: 9999;
				font-family: 'Inter', sans-serif;
				color: white;
			}
			.loader-logo {
				width: 80px;
				height: 80px;
				margin-bottom: 24px;
				border-radius: 20px;
				animation: pulse 2s infinite ease-in-out;
			}
			.loader-text {
				font-size: 1.5rem;
				font-weight: 600;
				letter-spacing: -0.025em;
				background: linear-gradient(to right, #a855f7, #ec4899);
				-webkit-background-clip: text;
				background-clip: text;
				-webkit-text-fill-color: transparent;
			}
			.loader-spinner {
				margin-top: 24px;
				width: 40px;
				height: 2px;
				background: rgba(255, 255, 255, 0.1);
				position: relative;
				overflow: hidden;
				border-radius: 1px;
			}
			.loader-spinner::after {
				content: '';
				position: absolute;
				left: -100%;
				width: 100%;
				height: 100%;
				background: linear-gradient(to right, transparent, #a855f7, transparent);
				animation: loading 1.5s infinite linear;
			}
			@keyframes pulse {
				0%, 100% { transform: scale(1); opacity: 0.8; }
				50% { transform: scale(1.05); opacity: 1; }
			}
			@keyframes loading {
				0% { left: -100%; }
				100% { left: 100%; }
			}
		</style>
	</head>

	<body>
		<div id="root">
			<div id="initial-loader">
				<img src="/icon.jpg" alt="Orchable Mascot" class="loader-logo" />
				<div class="loader-text">Orchable</div>
				<p style="color: rgba(255,255,255,0.5); font-size: 0.875rem; margin-top: 8px;">
					Orchestrate Anything. Automatically.
				</p>
				<div class="loader-spinner"></div>
			</div>
		</div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
